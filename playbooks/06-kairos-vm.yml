---
# Create and boot Kairos compute node VM in Proxmox.
# The VM PXE boots from BCM on the internal bridge (vmbr1).
#
# Prerequisites:
#   - BCM head node running and configured (playbook 02 + deploy-dd)
#   - vmbr1 internal bridge exists
#
# Usage:
#   ansible-playbook playbooks/03-kairos-vm.yml               # Create + start
#   ansible-playbook playbooks/03-kairos-vm.yml --tags stop    # Stop VM

- name: Manage Kairos compute node VM
  hosts: proxmox
  gather_facts: false
  roles:
    - kairos_vm
