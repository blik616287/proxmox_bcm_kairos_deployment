---
# Install all build dependencies for the E2E pipeline.
#
# Usage:
#   ansible-playbook playbooks/install-dependencies.yml
#   make install-deps
- name: Install build dependencies
  hosts: localhost
  gather_facts: true
  vars:
    ansible_python_interpreter: "{{ ansible_facts['playbook_python'] | default(ansible_playbook_python) }}"
  roles:
    - dependencies
