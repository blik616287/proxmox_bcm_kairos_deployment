---
# Kairos Compute Node VM:
#   1. Create VM with boot order: disk first, PXE fallback
#   2. Set boot to PXE first for initial install
#   3. Start VM → PXE boots → BCM provisions → dd writes Kairos → poweroff
#   4. Wait for VM to stop
#   5. Switch boot to disk first, start VM
#   6. Wait for Kairos to boot

- name: Check if Kairos VM exists
  tags: [create, stop]
  ansible.builtin.shell: qm status {{ kairos_vmid }}
  register: kairos_vm_check
  changed_when: false
  failed_when: false

- name: Create serial log directory
  tags: [create]
  when: kairos_vm_check.rc != 0
  ansible.builtin.file:
    path: /var/log/e2e
    state: directory

- name: Create Kairos compute node VM
  tags: [create]
  when: kairos_vm_check.rc != 0
  ansible.builtin.shell: |
    qm create {{ kairos_vmid }} \
      --name {{ kairos_vm_name }} \
      --memory {{ kairos_vm_memory }} \
      --cores {{ kairos_vm_cores }} \
      --bios seabios \
      --net0 virtio={{ kairos_vm_mac }},bridge={{ bcm_internal_bridge }} \
      --virtio0 {{ proxmox_storage | default('local-lvm') }}:{{ kairos_vm_disk_size | regex_replace('G$', '') }},format=raw \
      --boot order='virtio0;net0' \
      --ostype l26 \
      --vga std \
      --serial0 socket

# ---- PXE boot and install ----

- name: Ensure VM is stopped before install
  tags: [create]
  ansible.builtin.shell: |
    STATUS=$(qm status {{ kairos_vmid }} 2>/dev/null | awk '{print $2}')
    [ "$STATUS" = "running" ] && qm stop {{ kairos_vmid }} && sleep 5 || true
  changed_when: false
  failed_when: false

- name: Recreate disk for clean PXE install
  tags: [create]
  ansible.builtin.shell: |
    VOLID=$(qm config {{ kairos_vmid }} | grep virtio0 | awk '{print $2}' | cut -d, -f1)
    if [ -n "$VOLID" ]; then
      pvesm free "$VOLID" 2>/dev/null || true
      qm set {{ kairos_vmid }} --delete virtio0
    fi
    qm set {{ kairos_vmid }} --virtio0 {{ proxmox_storage | default('local-lvm') }}:{{ kairos_vm_disk_size | regex_replace('G$', '') }},format=raw
    echo "Disk recreated"
  changed_when: true

- name: Reset node001 install mode to FULL
  tags: [create]
  ansible.builtin.shell: |
    sshpass -p "{{ bcm_password }}" ssh {{ ssh_opts | default('-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR') }} root@{{ bcm_connect_ip }} \
      "echo -e 'device\nuse node001\nset installmode FULL\ncommit' | cmsh 2>&1"
  delegate_to: localhost
  changed_when: true

- name: Set boot order to PXE only for install
  tags: [create]
  ansible.builtin.shell: qm set {{ kairos_vmid }} --boot order='net0'

- name: Start Kairos VM (PXE boot)
  tags: [create]
  ansible.builtin.shell: qm start {{ kairos_vmid }}

- name: Display Kairos VM info
  tags: [create]
  ansible.builtin.debug:
    msg: >-
      Kairos VM started (VMID {{ kairos_vmid }}, PXE boot).
      BCM provisions installer → dd writes Kairos → VM powers off.

# ---- Wait for install to complete (VM powers off) ----

- name: Set BCM IP fact
  tags: [create]
  ansible.builtin.set_fact:
    bcm_vm_ip: "{{ bcm_connect_ip }}"

- name: Wait for VM to power off after install (up to 30 min)
  tags: [create]
  ansible.builtin.shell: |
    TIMEOUT=1800
    ELAPSED=0
    echo "Waiting for VM {{ kairos_vmid }} to power off..."
    while [ $ELAPSED -lt $TIMEOUT ]; do
      STATUS=$(qm status {{ kairos_vmid }} 2>/dev/null | awk '{print $2}')
      if [ "$STATUS" = "stopped" ]; then
        echo "VM powered off at ${ELAPSED}s"
        exit 0
      fi
      sleep 10
      ELAPSED=$((ELAPSED + 10))
    done
    echo "TIMEOUT after ${TIMEOUT}s"
    exit 1
  register: poweroff_result
  timeout: 1860

- name: Show install result
  tags: [create]
  ansible.builtin.debug:
    msg: "{{ poweroff_result.stdout_lines | default(['unknown']) | last }}"

# ---- Boot from disk ----

- name: Switch boot order to disk first
  tags: [create]
  ansible.builtin.shell: qm set {{ kairos_vmid }} --boot order='virtio0;net0'

- name: Start Kairos VM from disk
  tags: [create]
  ansible.builtin.shell: qm start {{ kairos_vmid }}

# ---- Wait for Kairos to boot ----

- name: Render Kairos boot wait script
  tags: [create]
  ansible.builtin.template:
    src: wait-kairos-boot.sh.j2
    dest: "{{ build_dir }}/wait-kairos-boot.sh"
    mode: "0755"
  delegate_to: localhost

- name: Wait for Kairos to fully boot (up to 10 min)
  tags: [create]
  ansible.builtin.shell: "{{ build_dir }}/wait-kairos-boot.sh"
  delegate_to: localhost
  register: kairos_boot_result
  timeout: 600

- name: Show Kairos boot result
  tags: [create]
  ansible.builtin.debug:
    msg: "{{ kairos_boot_result.stdout_lines | default(['unknown']) | last }}"

# ---- Debug capture ----

- name: Capture debug output
  tags: [create, debug]
  block:
    - name: Capture VGA screendump
      ansible.builtin.shell: |
        echo "screendump /tmp/kairos-vga.ppm" | qm monitor {{ kairos_vmid }} 2>/dev/null
        sleep 1
        [ -f /tmp/kairos-vga.ppm ] && cp /tmp/kairos-vga.ppm /var/log/e2e/kairos-vga.ppm
      changed_when: false
      failed_when: false

    - name: Fetch serial log to build host
      ansible.builtin.fetch:
        src: /var/log/e2e/kairos-serial.log
        dest: "{{ build_dir }}/kairos-serial.log"
        flat: true
      failed_when: false
      ignore_errors: true

    - name: Fetch VGA screendump to build host
      ansible.builtin.fetch:
        src: /var/log/e2e/kairos-vga.ppm
        dest: "{{ build_dir }}/kairos-vga.ppm"
        flat: true
      failed_when: false
      ignore_errors: true

    - name: Debug output locations
      ansible.builtin.debug:
        msg:
          - "Serial log: {{ build_dir }}/kairos-serial.log"
          - "VGA capture: {{ build_dir }}/kairos-vga.ppm"
          - "On Proxmox: /var/log/e2e/kairos-serial.log"

# ---- Stop / Destroy ----

- name: Stop Kairos VM
  tags: [stop, never]
  ansible.builtin.shell: qm stop {{ kairos_vmid }} || true

- name: Destroy Kairos VM
  tags: [destroy, never]
  ansible.builtin.shell: qm stop {{ kairos_vmid }} 2>/dev/null || true; qm destroy {{ kairos_vmid }} --purge 2>/dev/null || true
