---
# BCM Head Node VM — API-based, ISO boot (no SSH to Proxmox, no root@pam required).
#
# Boots from the remastered bcm-autoinstall.iso via CDROM.
# The ISO has auto-install patched into GRUB (timeout=0) and the rootfs
# contains the autoinstall script with the password hardcoded via Jinja2.
# No direct kernel boot (--args) needed.
#
# NIC order: net0 = internal (provisioning), net1 = external (management).
# With net.ifnames=0 biosdevname=0 in GRUB, these become eth0 and eth1.

- name: Set API auth variables
  tags: [always]
  ansible.builtin.set_fact:
    pve_api_url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port | default(8006) }}"
    pve_auth_header: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"

# ---- Upload remastered ISO via API ----

- name: Upload remastered BCM ISO to Proxmox
  tags: [create]
  ansible.builtin.shell: |
    API="{{ pve_api_url }}/api2/json/nodes/{{ proxmox_node }}/storage/local/upload"
    AUTH="{{ pve_auth_header }}"
    ISO_NAME="bcm-autoinstall.iso"
    # Check if already uploaded
    if curl -sk -H "Authorization: $AUTH" \
      "{{ pve_api_url }}/api2/json/nodes/{{ proxmox_node }}/storage/local/content" | \
      grep -q "$ISO_NAME"; then
      echo "$ISO_NAME already uploaded"
    else
      echo "Uploading $ISO_NAME (this may take several minutes)..."
      curl -sk -X POST -H "Authorization: $AUTH" \
        -F "content=iso" \
        -F "filename=@{{ build_dir }}/bcm-autoinstall.iso;filename=${ISO_NAME}" \
        "$API"
    fi
  delegate_to: localhost
  timeout: 1200

# ---- Check if VM exists ----

- name: Check if BCM VM exists
  tags: [create, start, stop]
  ansible.builtin.uri:
    url: "{{ pve_api_url }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ bcm_vmid }}/status/current"
    method: GET
    headers:
      Authorization: "{{ pve_auth_header }}"
    validate_certs: false
  register: bcm_vm_check
  failed_when: false

# ---- Create VM via API ----

- name: Create and install BCM head node
  tags: [create]
  when: bcm_vm_check.status != 200
  block:
    - name: Create BCM VM (ISO boot)
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port | default(8006) }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ bcm_vmid }}"
        name: "{{ bcm_vm_name }}"
        memory: "{{ bcm_vm_memory }}"
        cores: "{{ bcm_vm_cores }}"
        bios: seabios
        ostype: l26
        scsihw: virtio-scsi-pci
        net:
          net0: "virtio={{ bcm_vm_mac_internal }},bridge={{ bcm_internal_bridge }}{% if bcm_vlan_tag is defined %},tag={{ bcm_vlan_tag }}{% endif %}"
          net1: "virtio={{ bcm_vm_mac_external }},bridge={{ bcm_external_bridge | default('vmbr0') }}{% if bcm_external_vlan_tag is defined %},tag={{ bcm_external_vlan_tag }}{% endif %}"
        scsi:
          scsi0: "{{ proxmox_storage | default('local-lvm') }}:{{ bcm_vm_disk_size | regex_replace('G$', '') }},format=raw"
        ide:
          ide2: "local:iso/bcm-autoinstall.iso,media=cdrom"
        boot: "order=ide2;scsi0"
        state: present

    - name: Start BCM VM (boots from remastered ISO)
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port | default(8006) }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ bcm_vmid }}"
        state: started

    - name: Wait for BCM install to complete (monitor disk writes via API, up to 4 hours)
      ansible.builtin.shell: |
        TIMEOUT=14400
        ELAPSED=0
        PREV_WRITES=0
        STABLE_COUNT=0
        API_URL="{{ pve_api_url }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ bcm_vmid }}/status/current"
        AUTH="{{ pve_auth_header }}"
        echo "Monitoring disk writes via API..."
        # Wait for writes to start
        while [ $ELAPSED -lt 600 ]; do
          WRITES=$(curl -sk -H "Authorization: $AUTH" "$API_URL" 2>/dev/null | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['data'].get('diskwrite',0))" 2>/dev/null || echo 0)
          if [ "${WRITES:-0}" -gt 10000000 ]; then
            echo "Install started: ${WRITES} bytes written at ${ELAPSED}s"
            break
          fi
          sleep 10
          ELAPSED=$((ELAPSED + 10))
        done
        # Wait for writes to plateau
        while [ $ELAPSED -lt $TIMEOUT ]; do
          WRITES=$(curl -sk -H "Authorization: $AUTH" "$API_URL" 2>/dev/null | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['data'].get('diskwrite',0))" 2>/dev/null || echo 0)
          echo "Waiting... ${ELAPSED}s writes=${WRITES}"
          if [ "$WRITES" = "$PREV_WRITES" ] && [ "${WRITES:-0}" -gt 1000000000 ]; then
            STABLE_COUNT=$((STABLE_COUNT + 1))
            if [ $STABLE_COUNT -ge 3 ]; then
              echo "INSTALL_DONE: writes stable at ${WRITES} for 90s (${ELAPSED}s total)"
              exit 0
            fi
          else
            STABLE_COUNT=0
          fi
          PREV_WRITES="$WRITES"
          sleep 30
          ELAPSED=$((ELAPSED + 30))
        done
        echo "TIMEOUT after ${TIMEOUT}s"
        exit 1
      delegate_to: localhost
      async: 14400
      poll: 30

    - name: Stop BCM VM after install
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port | default(8006) }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ bcm_vmid }}"
        state: stopped
        force: true

    - name: Wait for VM to stop
      ansible.builtin.pause:
        seconds: 5

    - name: Switch BCM VM to disk boot (remove CDROM, boot from disk)
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port | default(8006) }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ bcm_vmid }}"
        ide:
          ide2: "none,media=cdrom"
        boot: "order=scsi0"
        update: true
        state: present

# ---- Start from disk ----

- name: Start BCM VM from disk
  tags: [create, start]
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_port: "{{ proxmox_api_port | default(8006) }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: false
    node: "{{ proxmox_node }}"
    vmid: "{{ bcm_vmid }}"
    state: started

# ---- Discover IP ----
# BCM gets DHCP on both NICs. We discover the IP by checking the Proxmox
# QEMU guest agent or by scanning the VLAN for the known MAC.

- name: Wait for BCM to get an IP (poll via API)
  tags: [create, start]
  ansible.builtin.shell: |
    API_URL="{{ pve_api_url }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ bcm_vmid }}/agent/network-get-interfaces"
    AUTH="{{ pve_auth_header }}"
    TIMEOUT=300
    ELAPSED=0
    while [ $ELAPSED -lt $TIMEOUT ]; do
      # Try QEMU guest agent first
      RESULT=$(curl -sk -H "Authorization: $AUTH" "$API_URL" 2>/dev/null)
      IP=$(echo "$RESULT" | python3 -c "
    import sys,json
    try:
      data = json.load(sys.stdin)['data']['result']
      for iface in data:
        for addr in iface.get('ip-addresses', []):
          ip = addr.get('ip-address','')
          if ip.startswith('10.') or ip.startswith('172.') or ip.startswith('192.168.'):
            print(ip)
            sys.exit(0)
    except: pass" 2>/dev/null)
      if [ -n "$IP" ]; then
        echo "$IP"
        exit 0
      fi
      # Fallback: try SSH to BCM internal IP
      if sshpass -p "{{ bcm_password }}" ssh \
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -o LogLevel=ERROR -o ConnectTimeout=3 \
          root@{{ bcm_internal_ip }} "echo ok" >/dev/null 2>&1; then
        # Get the IP from eth1 (or eth0 if single-NIC)
        IP=$(sshpass -p "{{ bcm_password }}" ssh \
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR \
          root@{{ bcm_internal_ip }} \
          "ip -4 addr show eth1 2>/dev/null | grep -oP 'inet \K[0-9.]+' || ip -4 addr show eth0 2>/dev/null | grep -oP 'inet \K[0-9.]+'" 2>/dev/null | \
          grep -oP '^\d+\.\d+\.\d+\.\d+$' | head -1)
        if [ -n "$IP" ]; then
          echo "$IP"
          exit 0
        fi
      fi
      sleep 10
      ELAPSED=$((ELAPSED + 10))
    done
    echo "TIMEOUT"
    exit 1
  delegate_to: localhost
  register: bcm_ip_discovery
  changed_when: false

- name: Set BCM IP fact
  tags: [create, start]
  ansible.builtin.set_fact:
    bcm_vm_ip: "{{ bcm_ip_discovery.stdout_lines | last | trim }}"

- name: Verify BCM SSH
  tags: [create, start]
  ansible.builtin.shell: |
    sshpass -p "{{ bcm_password }}" ssh \
      -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
      -o LogLevel=ERROR -o ConnectTimeout=10 \
      root@{{ bcm_vm_ip }} "hostname"
  delegate_to: localhost
  register: bcm_hostname_check

- name: Show BCM connectivity
  tags: [create, start]
  ansible.builtin.debug:
    msg: "BCM {{ bcm_hostname_check.stdout | trim }} reachable at {{ bcm_vm_ip }}"

- name: Wait for cmfirstboot to complete
  tags: [create, start]
  ansible.builtin.shell: |
    TIMEOUT=1800
    ELAPSED=0
    while [ $ELAPSED -lt $TIMEOUT ]; do
      STATUS=$(sshpass -p "{{ bcm_password }}" ssh \
        -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
        -o LogLevel=ERROR -o ConnectTimeout=5 \
        root@{{ bcm_vm_ip }} \
        "systemctl is-active cmfirstboot 2>/dev/null || echo inactive" 2>/dev/null | grep -oE 'active|activating|inactive' | tail -1)
      if [ "$STATUS" != "active" ] && [ "$STATUS" != "activating" ]; then
        echo "cmfirstboot done (status: ${STATUS:-inactive})"
        exit 0
      fi
      sleep 15
      ELAPSED=$((ELAPSED + 15))
      echo "cmfirstboot: ${STATUS} (${ELAPSED}s)"
    done
    echo "TIMEOUT"
    exit 1
  delegate_to: localhost
  timeout: 1800

- name: Display BCM VM info
  tags: [create, start]
  ansible.builtin.debug:
    msg: "BCM head node ready at {{ bcm_vm_ip }} (VMID {{ bcm_vmid }} on {{ proxmox_node }})"

- name: Save BCM IP for downstream tasks
  tags: [create, start]
  ansible.builtin.copy:
    content: "{{ bcm_vm_ip }}"
    dest: "{{ build_dir }}/.bcm-ip"
    mode: "0644"
  delegate_to: localhost

# ---- Stop ----

- name: Stop BCM VM
  tags: [stop, never]
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_port: "{{ proxmox_api_port | default(8006) }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: false
    node: "{{ proxmox_node }}"
    vmid: "{{ bcm_vmid }}"
    state: stopped
    force: true
